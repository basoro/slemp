# Custom ModSecurity Rules
# This file contains custom WAF rules created through the SLEMP panel
# Rules are automatically added here when created via the web interface

# Example custom rule (commented out)
# SecRule ARGS "@detectSQLi" \
#     "id:9001,phase:2,block,msg:'Custom SQL Injection Rule',logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',tag:'custom-rule',tag:'sqli'"

# Custom rules will be added below this line

# ===== DEFAULT SECURITY RULES =====

# 1. Block SQL Injection Attempts
SecRule ARGS "@detectSQLi" \
    "id:9001,phase:2,block,msg:'SQL Injection Attack Detected',logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',tag:'attack-sqli',tag:'OWASP_CRS',tag:'capec/1000/152/248/66',severity:'CRITICAL'"

# 2. Block XSS (Cross-Site Scripting) Attempts
SecRule ARGS "@detectXSS" \
    "id:9002,phase:2,block,msg:'XSS Attack Detected',logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',tag:'attack-xss',tag:'OWASP_CRS',tag:'capec/1000/152/242',severity:'CRITICAL'"

# 3. Block Common Web Shells
SecRule REQUEST_FILENAME "@rx (?i)\.(php|jsp|asp|aspx)$" \
    "chain,id:9003,phase:2,block,msg:'Potential Web Shell Upload',tag:'attack-rce',severity:'CRITICAL'"
SecRule REQUEST_BODY "@rx (?i)(eval|exec|system|shell_exec|passthru|base64_decode|gzinflate|str_rot13)"

# 4. Block Directory Traversal
SecRule ARGS "@rx \.\./" \
    "id:9004,phase:2,block,msg:'Directory Traversal Attack',logdata:'Matched Data: %{MATCHED_VAR}',tag:'attack-lfi',tag:'OWASP_CRS',severity:'CRITICAL'"

# 5. Block Command Injection
SecRule ARGS "@rx (?i)(;|\||`|\$\(|\${)" \
    "id:9005,phase:2,block,msg:'Command Injection Attack',logdata:'Matched Data: %{MATCHED_VAR}',tag:'attack-rce',tag:'OWASP_CRS',severity:'CRITICAL'"

# 6. Block Suspicious User Agents
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(sqlmap|nmap|nikto|w3af|acunetix|nessus|openvas|vega|wpscan|dirbuster|gobuster|masscan|zap|burp)" \
    "id:9006,phase:1,deny,status:403,msg:'Malicious Scanner Detected',tag:'attack-reputation-scanner',severity:'WARNING'"

# 7. Rate Limiting - Block excessive requests
SecRule IP:bf_counter "@gt 100" \
    "id:9007,phase:1,deny,status:429,msg:'Rate limit exceeded - too many requests',expirevar:IP.bf_counter=300,tag:'dos-protection',severity:'WARNING'"
SecAction "id:9008,phase:1,nolog,pass,initcol:IP=%{REMOTE_ADDR},setvar:IP.bf_counter=+1,expirevar:IP.bf_counter=60"

# 8. Block File Upload Attacks
SecRule FILES_NAMES "@rx (?i)\.(php|phtml|php3|php4|php5|php7|pht|phar|jsp|jspx|jsw|jsv|jspf|asp|aspx|asa|asax|ascx|ashx|asmx|cer|swf|class)$" \
    "id:9009,phase:2,block,msg:'Dangerous File Upload Blocked',tag:'attack-rce',severity:'CRITICAL'"

# 9. Block HTTP Method Attacks
SecRule REQUEST_METHOD "@rx ^(TRACE|TRACK|DEBUG|OPTIONS)$" \
    "id:9010,phase:1,deny,status:405,msg:'HTTP Method Not Allowed',tag:'protocol-violation',severity:'WARNING'"

# 10. Block Suspicious Headers
SecRule REQUEST_HEADERS:X-Forwarded-For "@rx (?i)(union|select|insert|delete|update|drop|create|alter|exec|script)" \
    "id:9011,phase:1,block,msg:'Suspicious Header Content',tag:'attack-generic',severity:'WARNING'"

# 11. Block Large POST Requests (potential DoS)
SecRule REQUEST_METHOD "@streq POST" \
    "chain,id:9012,phase:1,deny,status:413,msg:'POST request too large',tag:'dos-protection',severity:'WARNING'"
SecRule REQUEST_HEADERS:Content-Length "@gt 10485760"

# 12. Block Null Byte Attacks
SecRule ARGS "@rx \x00" \
    "id:9013,phase:2,block,msg:'Null Byte Attack Detected',tag:'attack-lfi',severity:'CRITICAL'"

# 13. Block LDAP Injection
SecRule ARGS "@rx (?i)(\(|\)|\*|\\|\||&|!|=|<|>|~|;)" \
    "id:9014,phase:2,block,msg:'LDAP Injection Attack',tag:'attack-ldapi',severity:'CRITICAL'"

# 14. Block XML External Entity (XXE) Attacks
SecRule REQUEST_BODY "@rx (?i)<!ENTITY.*SYSTEM" \
    "id:9015,phase:2,block,msg:'XXE Attack Detected',tag:'attack-xxe',severity:'CRITICAL'"

# 15. Block Server-Side Request Forgery (SSRF)
SecRule ARGS "@rx (?i)(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\]|file://|dict://|ftp://|gopher://|ldap://)" \
    "id:9016,phase:2,block,msg:'SSRF Attack Detected',tag:'attack-ssrf',severity:'CRITICAL'"