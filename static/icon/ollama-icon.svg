<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="ollamaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="url(#ollamaGradient)" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- AI Brain Icon -->
  <g transform="translate(25, 25)">
    <!-- Brain outline -->
    <path d="M25 10 C35 5, 45 10, 45 20 C50 25, 50 35, 45 40 C35 45, 15 45, 5 40 C0 35, 0 25, 5 20 C5 10, 15 5, 25 10 Z" 
          fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Neural connections -->
    <circle cx="20" cy="20" r="2" fill="white"/>
    <circle cx="30" cy="18" r="2" fill="white"/>
    <circle cx="25" cy="28" r="2" fill="white"/>
    <circle cx="35" cy="25" r="2" fill="white"/>
    <circle cx="15" cy="30" r="2" fill="white"/>
    
    <!-- Connection lines -->
    <line x1="20" y1="20" x2="30" y2="18" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="30" y1="18" x2="35" y2="25" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="25" y1="28" x2="35" y2="25" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="20" y1="20" x2="25" y2="28" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <line x1="15" y1="30" x2="25" y2="28" stroke="white" stroke-width="1.5" opacity="0.8"/>
  </g>
  
  <!-- Ollama text -->
  <text x="50" y="75" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">OLLAMA</text>
</svg>